<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <script src="https://raw.githack.com/fcor/arjs-gestures/master/dist/gestures.js"></script>
  </head>
  <body style="margin: 0; overflow: hidden;">
    <a-scene 
      embedded 
      arjs="sourceType: webcam; debugUIEnabled: false;"
      gesture-detector>
      
      <a-marker preset="hiro" raycaster="objects: .clickable" emitevents="true" cursor="fuse: false; rayOrigin: mouse;">
        
        <a-entity 
          id="maca"
          gltf-model="Cat.glb" 
          scale="0.03 0.03 0.03" 
          position="0 0 0.6" 
          class="clickable"
          gesture-handler="rotationEnabled: false; scaleEnabled: false;">
        </a-entity>

        <a-entity 
          gltf-model="Fish.glb" 
          scale="0.01 0.01 0.01" 
          position="-0.5 1 -2"
          animation="property: position; from: -0.5 1 -2; to: -0.2 -1 2; dur: 4000; loop: true; easing: easeInQuad">
        </a-entity>

        <a-entity 
          gltf-model="Fish.glb" 
          scale="0.01 0.01 0.01" 
          position="0.5 0.8 -2.5"
          rotation="0 45 0"
          animation="property: position; from: 0.5 0.8 -2.5; to: 0.3 -1 2.5; dur: 4500; delay: 1500; loop: true; easing: easeInQuad">
        </a-entity>

      </a-marker>

      <a-entity camera></a-entity>
    </a-scene>
  </body>
</html>
