<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <script>
      AFRAME.registerComponent('lovac-sistem-v3', {
        init: function () {
          this.maca = document.querySelector('#maca');
          this.scena = document.querySelector('a-marker');
          // 40 ribica za dobar efekat
          for (let i = 0; i < 40; i++) {
            this.stvoriRibu();
          }
        },

        stvoriRibu: function () {
          let riba = document.createElement('a-entity');
          riba.setAttribute('gltf-model', 'Fish.glb');
          riba.setAttribute('scale', '0.003 0.003 0.003');
          riba.setAttribute('class', 'riba');
          
          // POZICIJA: X nasumično, Y visoko (iznad telefona), Z je 0.5 (ispred markera)
          let x = (Math.random() - 0.5) * 4;
          let y_start = 5 + Math.random() * 3;
          let z = 0.5; // Fiksno da padaju pravo na macu
          
          riba.setAttribute('position', {x: x, y: y_start, z: z});
          
          // ANIMACIJA: Strogo vertikalni pad na nivo stola (Y = -1)
          let brzina = 1200 + Math.random() * 1800;
          riba.setAttribute('animation', `
            property: position; 
            to: ${x} -1 ${z}; 
            dur: ${brzina}; 
            easing: linear; 
            loop: true
          `);
          
          this.scena.appendChild(riba);
        },

        tick: function () {
          let ribe = document.querySelectorAll('.riba');
          let macaPos = new THREE.Vector3();
          this.maca.object3D.getWorldPosition(macaPos);

          ribe.forEach((riba) => {
            if (!riba.object3D) return;
            let ribaPos = new THREE.Vector3();
            riba.object3D.getWorldPosition(ribaPos);
            
            // SUDAR SA MACOM
            let dist = macaPos.distanceTo(ribaPos);
            if (dist < 0.5 && riba.getAttribute('visible') !== false) {
              riba.setAttribute('visible', 'false');
              setTimeout(() => { this.resetRiba(riba); }, 1000);
            }

            // NESTAJANJE NA NIVOU STOLA (Y = -1)
            if (ribaPos.y <= -0.9) {
               riba.setAttribute('visible', 'false');
               setTimeout(() => { this.resetRiba(riba); }, 100);
            }
          });
        },

        resetRiba: function(riba) {
          let x = (Math.random() - 0.5) * 4;
          riba.setAttribute('position', {x: x, y: 5, z: 0.5});
          riba.setAttribute('visible', 'true');
        }
      });
    </script>
  </head>
  <body style="margin: 0; overflow: hidden;">
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" lovac-sistem-v3>
      
      <a-marker preset="hiro">
        
        <a-entity id="maca-lokacija">
          <a-entity 
            id="maca"
            gltf-model="Cat.glb" 
            scale="1.3 1.3 1.3" 
            position="0 -1 0.5" 
            rotation="0 180 0"
            animation__skok="property: position; from: 0 -1 0.5; to: 0 0.5 0.5; dur: 300; dir: alternate; loop: 1; startEvents: skoci">
          </a-entity>
        </a-entity>

      </a-marker>

      <a-entity camera></a-entity>
    </a-scene>

    <script>
      // Skok na dodir
      window.addEventListener('touchstart', () => {
        document.querySelector('#maca').emit('skoci');
      });

      // KRETANJE: Maca prati nagib telefona levo-desno
      window.addEventListener('deviceorientation', function(event) {
        let maca = document.querySelector('#maca');
        if(maca) {
          let nagib = event.gamma; 
          let limitX = Math.max(Math.min(nagib / 8, 2.5), -2.5); 
          maca.object3D.position.x = limitX;
        }
      });
    </script>
  </body>
</html>
