
<!DOCTYPE html>
<html>
  <head>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  </head>
  <body style="margin: 0; overflow: hidden;">
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false; patternRatio: 0.75;">
      
      <a-marker type="pattern" url="Marker.patt">
        
        <a-entity gltf-model="Cat.glb" scale="0.7 0.7 0.7" position="0 0 0" rotation="0 180 0"></a-entity>

        <a-entity gltf-model="Fish.glb" position="-0.8 1.2 -0.5" scale="0.2 0.2 0.2" animation="property: position; to: -0.8 1.5 -0.5; dur: 1200; dir: alternate; loop: true"></a-entity>
        <a-entity gltf-model="Fish.glb" position="0.8 0.8 0.5" scale="0.2 0.2 0.2" rotation="0 45 0" animation="property: position; to: 0.8 1.1 0.5; dur: 1500; dir: alternate; loop: true"></a-entity>
        <a-entity gltf-model="Fish.glb" position="0 1.6 -1" scale="0.25 0.25 0.25" rotation="0 180 0" animation="property: position; to: 0 1.9 -1; dur: 1000; dir: alternate; loop: true"></a-entity>

      </a-marker>

      <a-entity camera></a-entity>
    </a-scene>
  </body>
</html>
