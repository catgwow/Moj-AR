<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { overflow: hidden; background: transparent; }

      #ui-score {
        position: fixed;
        top: 16px;
        left: 50%;
        transform: translateX(-50%);
        color: #fff;
        font-size: 30px;
        font-weight: bold;
        font-family: Arial, sans-serif;
        text-shadow: 0 2px 8px rgba(0,0,0,0.9);
        z-index: 1000;
        background: rgba(0,0,0,0.55);
        padding: 8px 30px;
        border-radius: 40px;
        pointer-events: none;
        white-space: nowrap;
        letter-spacing: 1px;
      }

      #ui-flash {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        font-size: 50px;
        z-index: 2000;
        pointer-events: none;
        opacity: 0;
        transition: opacity 0.15s;
      }

      #ui-hint {
        position: fixed;
        bottom: 22px;
        left: 50%;
        transform: translateX(-50%);
        color: rgba(255,255,255,0.88);
        font-size: 13px;
        font-family: Arial, sans-serif;
        background: rgba(0,0,0,0.45);
        padding: 5px 16px;
        border-radius: 20px;
        pointer-events: none;
        z-index: 1000;
        white-space: nowrap;
      }

      #ui-combo {
        position: fixed;
        top: 78px;
        left: 50%;
        transform: translateX(-50%);
        color: #FFD700;
        font-size: 24px;
        font-weight: bold;
        font-family: Arial, sans-serif;
        text-shadow: 0 2px 8px #000;
        z-index: 1000;
        pointer-events: none;
        opacity: 0;
        transition: opacity 0.25s;
        white-space: nowrap;
      }
    </style>

    <script>
      // ═══════════════════════════════════════════════
      //  GLOBALNE PROMENLJIVE
      // ═══════════════════════════════════════════════
      let macaX   = 0;      // levo/desno kretanje mačke
      let macaZ   = 0;      // napred/nazad kretanje mačke
      let jumpY   = 0;      // visina skoka
      let skace   = false;  // da li je skok u toku
      let bodovi  = 0;      // ukupan skor
      let combo   = 0;      // combo brojač
      let comboTimer = null;

      // ── Skok: parabolična animacija ──────────────────
      function skok() {
        if (skace) return;
        skace = true;
        const H = 1.1;          // max visina
        const T = 560;          // trajanje ms
        const t0 = performance.now();

        function loop(now) {
          const t = Math.min((now - t0) / T, 1.0);
          jumpY = H * Math.sin(Math.PI * t);
          if (t < 1.0) requestAnimationFrame(loop);
          else { jumpY = 0; skace = false; }
        }
        requestAnimationFrame(loop);
      }

      // ═══════════════════════════════════════════════
      //  AFRAME KOMPONENT – IGRA
      // ═══════════════════════════════════════════════
      AFRAME.registerComponent('igra', {

        init: function () {
          this.ribe  = [];
          this.maca  = null;
          this.nomEl = null; // "nom" efekat entitet

          const self = this;

          // Spawn ribica s razmakom da ne udare sve odjednom
          for (let i = 0; i < 12; i++) {
            setTimeout(function() { self.novaRiba(); }, i * 380);
          }
        },

        // ── Kreira novu ribicu ──────────────────────────
        novaRiba: function () {
          const riba = document.createElement('a-entity');
          riba.setAttribute('gltf-model', 'Fish.glb');

          // !! PODESI SKALU prema tvom Fish.glb modelu !!
          // Ako su ribice premale → povećaj (npr. 0.05 0.05 0.05)
          // Ako su prevelike     → smanji  (npr. 0.005 0.005 0.005)
          riba.setAttribute('scale', '0.02 0.02 0.02');

          const sp = this.randomStart();
          riba.object3D.position.set(sp.x, sp.y, sp.z);

          // Random rotacija za prirodniji izgled
          riba.object3D.rotation.set(
            Math.random() * Math.PI,
            Math.random() * Math.PI * 2,
            Math.random() * Math.PI
          );

          // Brzina pada (0.0006 – 0.0018 jed/ms ≈ 2–7 sekundi)
          riba._speed  = 0.0006 + Math.random() * 0.0012;
          riba._active = true;

          this.el.appendChild(riba);
          this.ribe.push(riba);
        },

        // ── Nasumična startna pozicija iznad markera ────
        randomStart: function () {
          return {
            x: (Math.random() - 0.5) * 3.0,
            y: 5.0 + Math.random() * 3.0,   // 5–8 jed. iznad stola
            z: (Math.random() - 0.5) * 3.0
          };
        },

        // ── Efekat hvatanja: scale puls + "NOM!" ────────
        eatEffect: function () {
          // ① Flash emoji na ekranu
          const flash = document.getElementById('ui-flash');
          flash.textContent = ['😺','🐾','✨','💥'][Math.floor(Math.random()*4)];
          flash.style.opacity = '1';
          setTimeout(function() { flash.style.opacity = '0'; }, 380);

          // ② Mačka se "napuše" (scale puls)
          if (!this.maca) return;
          const origScale = 1.3;
          this.maca.object3D.scale.setScalar(origScale * 1.5);
          setTimeout(function() {
            if (this.maca) this.maca.object3D.scale.setScalar(origScale);
          }.bind(this), 200);
        },

        // ── Sakrij ribicu i respawnuj je ────────────────
        respawn: function (riba, delay, uhvacena) {
          riba._active = false;
          riba.object3D.visible = false;

          if (uhvacena) this.eatEffect();

          const self = this;
          setTimeout(function () {
            const sp = self.randomStart();
            riba.object3D.position.set(sp.x, sp.y, sp.z);
            // Nova nasumična rotacija za svaki pad
            riba.object3D.rotation.set(
              Math.random() * Math.PI,
              Math.random() * Math.PI * 2,
              Math.random() * Math.PI
            );
            riba._active = true;
            riba.object3D.visible = true;
          }, delay);
        },

        // ── Combo displej ────────────────────────────────
        prikaziCombo: function (n) {
          if (n < 2) return;
          const el = document.getElementById('ui-combo');
          el.textContent = n >= 5
            ? '🔥 SUPER COMBO x' + n + '!'
            : '✨ Combo x' + n;
          el.style.opacity = '1';
          clearTimeout(comboTimer);
          comboTimer = setTimeout(function() {
            el.style.opacity = '0';
          }, 1300);
        },

        // ═══════════════════════════════════════════════
        //  TICK – svaki frame
        // ═══════════════════════════════════════════════
        tick: function (time, delta) {

          // Pauziraj ako marker nije vidljiv
          if (!this.el.object3D.visible) return;

          // Dohvati mačku
          if (!this.maca) {
            this.maca = this.el.querySelector('#maca');
            if (!this.maca) return;
          }

          // ── Primeni poziciju mačke ──────────────────
          // X = tilt levo/desno (gamma)
          // Y = skok (parabola)
          // Z = fiksno (sto)
          this.maca.object3D.position.x = macaX;
          this.maca.object3D.position.y = jumpY;
          this.maca.object3D.position.z = 0;

          const mp = this.maca.object3D.position;
          const dt = delta || 16;

          // ── Obradi svaku ribicu ─────────────────────
          this.ribe.forEach(function(riba) {
            if (!riba._active || !riba.object3D.visible) return;

            const p = riba.object3D.position;

            // ① Pad nadole
            p.y -= riba._speed * dt;

            // ② Rotacija tokom pada (vizuelni efekat)
            riba.object3D.rotation.x += 0.018;
            riba.object3D.rotation.y += 0.025;

            // ③ Kolizija: MAČKA ← → RIBICA
            const dx = mp.x - p.x;
            const dy = mp.y - p.y;
            const dz = mp.z - p.z;
            const dist = Math.sqrt(dx*dx + dy*dy + dz*dz);

            if (dist < 0.5) {
              // 🐟 UHVAĆENA!
              bodovi++;
              combo++;
              document.getElementById('ui-score').textContent = '🐟 ' + bodovi;
              this.prikaziCombo(combo);
              this.respawn(riba, 800 + Math.random() * 1200, true);
              return;
            }

            // ④ Ribica UDARILA U STO → nestaje ODMAH
            if (p.y <= 0.05) {
              combo = 0; // resetuj combo
              this.respawn(riba, 100 + Math.random() * 400, false);
            }
          }.bind(this));
        }

      }); // kraj komponente
    </script>
  </head>

  <body>
    <div id="ui-score">🐟 0</div>
    <div id="ui-combo"></div>
    <div id="ui-flash"></div>
    <div id="ui-hint">↔️ Nagni levo/desno &nbsp;|&nbsp; 📲 Tresni napred/nazad za SKOK</div>

    <a-scene
      embedded
      arjs="sourceType: webcam; debugUIEnabled: false;"
      vr-mode-ui="enabled: false"
      renderer="antialias: true; alpha: true; colorManagement: true;">

      <!-- ═══ HIRO MARKER ═══════════════════════════ -->
      <a-marker preset="hiro" igra>

        <!--
          MAČKA:
          - position="0 0 0"  → stoji na markeru (stolu)
          - rotation="0 180 0" → okrenut prema kameri
          - Ako noge lebde: smanji Y na npr. position="0 -0.1 0"
          - Ako ne gleda gore: promeni rotation na "-10 180 0"
        -->
        <a-entity
          id="maca"
          gltf-model="Cat.glb"
          scale="1.3 1.3 1.3"
          position="0 0 0"
          rotation="-15 180 0">
        </a-entity>

      </a-marker>

      <a-entity camera></a-entity>
    </a-scene>

    <!-- ═══════════════════════════════════════════════
         KONTROLE
    ════════════════════════════════════════════════ -->
    <script>
      // ── Kretanje levo/desno: nagib telefona (gamma) ──
      // ── Skok: nagib telefona napred/nazad (beta delta)
      let prevBeta     = null;
      let jumpCooldown = false;   // sprečava višestruke skokove

      window.addEventListener('deviceorientation', function (e) {
        const gamma = e.gamma || 0;
        const beta  = e.beta  || 0;

        // LEVO / DESNO kretanje mačke
        // gamma: -90 (levo) … +90 (desno)
        macaX = Math.max(-2.2, Math.min(2.2, gamma / 10));

        // SKOK: detektuj brzu promenu nagiba napred/nazad
        if (prevBeta !== null && !jumpCooldown) {
          const dBeta = Math.abs(beta - prevBeta);
          if (dBeta > 22) {          // prag: 22° naglo naginjanje
            jumpCooldown = true;
            skok();
            setTimeout(function() { jumpCooldown = false; }, 700);
          }
        }
        prevBeta = beta;
      });

      // ── Backup: devicemotion (snažno tresenje) ───────
      window.addEventListener('devicemotion', function (e) {
        if (!e.acceleration || jumpCooldown) return;
        // Na portertu telefona, X osa = napred/nazad tresenje
        const sila = Math.abs(e.acceleration.x || 0)
                   + Math.abs(e.acceleration.z || 0);
        if (sila > 18) {
          jumpCooldown = true;
          skok();
          setTimeout(function() { jumpCooldown = false; }, 700);
        }
      });

      // ── Backup2: dodir ekrana ────────────────────────
      window.addEventListener('touchstart', function () {
        if (!jumpCooldown) {
          jumpCooldown = true;
          skok();
          setTimeout(function() { jumpCooldown = false; }, 700);
        }
      });
    </script>
  </body>
</html>
