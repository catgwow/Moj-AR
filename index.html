<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v6.1.1/dist/aframe-extras.min.js"></script>
  </head>
  <body style="margin: 0; overflow: hidden;">
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
      
      <a-marker preset="hiro">
        
        <a-entity 
          id="maca"
          gltf-model="Cat.glb" 
          scale="0.6 0.6 0.6" 
          position="0 -1.5 0.5" 
          rotation="0 180 0"
          animation="property: position; to: 0 -0.8 0.5; dur: 500; dir: alternate; loop: true; easing: easeInOutQuad; startEvents: click">
          </a-entity>

        <a-entity gltf-model="Fish.glb" scale="0.004 0.004 0.004" position="-0.8 2 -1"
          animation="property: position; to: 0 -1.5 0.5; dur: 1000; loop: true; easing: linear">
        </a-entity>

        <a-entity gltf-model="Fish.glb" scale="0.004 0.004 0.004" position="0.8 1.5 -1.5"
          animation="property: position; to: 0 -1.5 0.5; dur: 1300; delay: 300; loop: true; easing: linear">
        </a-entity>

      </a-marker>

      <a-entity camera cursor="rayOrigin: mouse"></a-entity>
    </a-scene>
  </body>
</html>
