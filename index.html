<!DOCTYPE html>
<html>
<head>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
        #ui {
            position: fixed; top: 20px; width: 100%; text-align: center;
            color: #22ff22; font-family: Arial; font-size: 24px; font-weight: bold; z-index: 100;
        }
    </style>
</head>
<body style="margin: 0; overflow: hidden;">
    <div id="ui">POENI: <span id="score">0</span></div>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
        <a-entity camera look-controls>
            <a-entity 
                gltf-model="url(Cat.glb)"
                position="0 -0.5 -1.5"
                scale="0.05 0.05 0.05"
                rotation="0 180 0"
                animation-mixer>
            </a-entity>
        </a-entity>

        <a-entity id="spawner" position="0 1.5 -3"></a-entity>
    </a-scene>

    <script>
        // Ovde dodajemo skriptu za kisu ribica
        function createFish() {
            let scene = document.querySelector('a-scene');
            let fish = document.createElement('a-entity');
            fish.setAttribute('gltf-model', 'url(Fish.glb)');
            fish.setAttribute('position', '0 1.5 -3');
            fish.setAttribute('scale', '0.1 0.1 0.1');
            
            // Logika za padanje ribice
            scene.appendChild(fish);
        }
        setInterval(createFish, 3000);
    </script>
</body>
</html>
