<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <script src="https://unpkg.com/aframe-proxy-event-component/dist/aframe-proxy-event-component.min.js"></script>
  </head>
  <body style="margin: 0; overflow: hidden;">
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
      
      <a-marker preset="hiro">
        
        <a-entity 
          id="maca"
          gltf-model="Cat.glb" 
          scale="0.8 0.8 0.8" 
          position="0 -1 0.5" 
          rotation="0 180 0">
        </a-entity>

        <a-entity gltf-model="Fish.glb" scale="0.003 0.003 0.003" position="-0.5 2 -1"
          animation="property: position; to: 0.2 -1.5 1; dur: 1200; loop: true; easing: linear">
        </a-entity>

        <a-entity gltf-model="Fish.glb" scale="0.003 0.003 0.003" position="0.6 1.8 -0.5"
          animation="property: position; to: -0.3 -1.5 1.5; dur: 1500; delay: 200; loop: true; easing: linear">
        </a-entity>

        <a-entity gltf-model="Fish.glb" scale="0.003 0.003 0.003" position="0 2.2 -1.2"
          animation="property: position; to: 0.5 -1.5 0.8; dur: 1000; delay: 400; loop: true; easing: linear">
        </a-entity>

        <a-entity gltf-model="Fish.glb" scale="0.003 0.003 0.003" position="-0.8 1.5 0"
          animation="property: position; to: 0.4 -1.5 -1.5; dur: 1300; delay: 600; loop: true; easing: linear">
        </a-entity>

        <a-entity gltf-model="Fish.glb" scale="0.003 0.003 0.003" position="0.3 2 -2"
          animation="property: position; to: -0.6 -1.5 0.5; dur: 1100; delay: 800; loop: true; easing: linear">
        </a-entity>

      </a-marker>

      <a-entity camera></a-entity>
    </a-scene>
  </body>
</html>
