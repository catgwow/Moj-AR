<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AR Mačka Animacija</title>
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
    <style>
        body { margin: 0; background-color: #000; overflow: hidden; }
        model-viewer { width: 100vw; height: 100vh; --poster-color: transparent; }
        .ar-button {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            padding: 16px 32px; background: #22ff22; color: black;
            border: none; border-radius: 50px; font-weight: bold; font-size: 18px;
            box-shadow: 0 4px 15px rgba(0,255,0,0.4); z-index: 100;
        }
    </style>
</head>
<body>

    <model-viewer 
        id="macka"
        src="Cat.glb" 
        ar 
        ar-modes="webxr scene-viewer quick-look" 
        camera-controls 
        shadow-intensity="1" 
        ar-placement="floor"
        autoplay
        crossorigin="anonymous">
        
        <button slot="ar-button" class="ar-button">
            🐾 PUSTI MAČKU U SOBU
        </button>

    </model-viewer>

    <script>
        const modelViewer = document.querySelector("#macka");

        // Čim se model učita, tražimo animaciju
        modelViewer.addEventListener("load", () => {
            const animations = modelViewer.getAvailableAnimations();
            
            if (animations.length > 0) {
                // Puštamo prvu animaciju na listi (rep/glava)
                modelViewer.animationName = animations[0];
                modelViewer.play();
                console.log("Pokrenuta animacija:", animations[0]);
            } else {
                console.log("Ovaj model nema ugrađene animacije.");
            }
        });
    </script>

</body>
</html>
