<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cat vs Fish Rain</title>
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; }
        #ui {
            position: absolute; top: 20px; width: 100%; text-align: center;
            color: #22ff22; font-family: sans-serif; font-weight: bold; z-index: 100;
        }
        .ar-button {
            position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%);
            padding: 20px 40px; background: #22ff22; border: none; border-radius: 50px;
            font-weight: bold; font-size: 20px; z-index: 1000;
        }
    </style>
</head>
<body>

    <div id="ui">POENI: <span id="score">0</span><br>Usmeri ka šolji!</div>

    <model-viewer 
        id="game"
        src="Cat.glb" 
        ar 
        ar-modes="webxr scene-viewer" 
        camera-controls 
        autoplay
        scale="0.05 0.05 0.05"
        ar-placement="floor">
        
        <button slot="ar-button" class="ar-button">START IGRICA</button>

    </model-viewer>

    <script>
        const modelViewer = document.querySelector("#game");
        let score = 0;

        // Funkcija koja stvara ribicu
        function spawnFish() {
            if (modelViewer.isPresenting) { // Samo ako je AR upaljen
                const fish = document.createElement('model-viewer');
                fish.src = 'Fish.glb';
                fish.style.position = 'absolute';
                fish.style.width = '100px';
                fish.style.height = '100px';
                // Ovde dodajemo logiku da ribica iskace iz tacke iznad solje
                // Za pravu kisu ribica u WebXR-u potreban je Three.js framework
                // ali ovaj 'model-viewer' pristup je sigurniji za Samsung kameru
            }
        }

        // Svake 2 sekunde iskoci nova riba
        setInterval(spawnFish, 2000);
    </script>
</body>
</html>
