<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

    <style>
      #ui-score {
        position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
        color: #fff; font-size: 32px; font-family: 'Arial', sans-serif;
        background: rgba(0,0,0,0.6); padding: 10px 25px; border-radius: 50px;
        z-index: 100; text-shadow: 2px 2px 4px #000;
      }
    </style>

    <script>
      let macaX = 0;
      let jumpY = 0;
      let skace = false;
      let bodovi = 0;

      // Funkcija za skok (Parabola)
      function pokreniSkok() {
        if (skace) return;
        skace = true;
        let start = performance.now();
        let trajanje = 500; // ms

        function up(now) {
          let progres = (now - start) / trajanje;
          if (progres < 1) {
            jumpY = Math.sin(progres * Math.PI) * 1.5; // Visina skoka
            requestAnimationFrame(up);
          } else {
            jumpY = 0;
            skace = false;
          }
        }
        requestAnimationFrame(up);
      }

      AFRAME.registerComponent('pro-igra', {
        init: function () {
          this.maca = document.querySelector('#maca');
          this.ribe = [];
          for (let i = 0; i < 20; i++) { this.stvoriRibu(); }
        },

        stvoriRibu: function () {
          let riba = document.createElement('a-entity');
          riba.setAttribute('gltf-model', 'Fish.glb');
          riba.setAttribute('scale', '0.004 0.004 0.004'); // Sitne ribice
          riba.setAttribute('class', 'riba');
          
          let x = (Math.random() - 0.5) * 4;
          let z = (Math.random() - 0.5) * 2;
          let y = 6 + Math.random() * 4;
          
          riba.setAttribute('position', {x: x, y: y, z: z});
          let brzina = 1500 + Math.random() * 2000;
          riba.setAttribute('animation', `property: position; to: ${x} -0.5 ${z}; dur: ${brzina}; easing: linear; loop: true`);
          
          this.el.appendChild(riba);
          this.ribe.push(riba);
        },

        tick: function () {
          if (!this.maca) return;

          // Pozicioniranje mace (na markeru/stolu)
          this.maca.object3D.position.x = macaX;
          this.maca.object3D.position.y = jumpY;

          let macaPos = new THREE.Vector3();
          this.maca.object3D.getWorldPosition(macaPos);
          // Pomeramo tačku detekcije "u usta" (malo iznad poda)
          let ustaPos = macaPos.clone().add(new THREE.Vector3(0, 0.4, 0));

          this.ribe.forEach((riba) => {
            if (!riba.object3D || !riba.getAttribute('visible')) return;
            
            let ribaPos = new THREE.Vector3();
            riba.object3D.getWorldPosition(ribaPos);
            
            let dist = ustaPos.distanceTo(ribaPos);

            // 1. Hvatanje usta (Detekcija)
            if (dist < 0.4) {
              riba.setAttribute('visible', 'false');
              bodovi++;
              document.getElementById('ui-score').innerText = "🐟 " + bodovi;
              setTimeout(() => this.resetRiba(riba), 1000);
            }

            // 2. Dodir sa stolom (Y = 0)
            if (ribaPos.y <= -0.4) {
              riba.setAttribute('visible', 'false');
              setTimeout(() => this.resetRiba(riba), 200);
            }
          });
        },

        resetRiba: function(riba) {
          let x = (Math.random() - 0.5) * 4;
          riba.setAttribute('position', {x: x, y: 6, z: (Math.random() - 0.5) * 2});
          riba.setAttribute('visible', 'true');
        }
      });
    </script>
  </head>

  <body style="margin: 0; overflow: hidden;">
    <div id="ui-score">🐟 0</div>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
      <a-marker preset="hiro" pro-igra>
        
        <a-entity 
          id="maca"
          gltf-model="Cat.glb" 
          scale="1.3 1.3 1.3" 
          position="0 0 0" 
          rotation="-35 180 0">
        </a-entity>

      </a-marker>
      <a-entity camera></a-entity>
    </a-scene>

    <script>
      // Kontrola nagibom (Levo-Desno)
      window.addEventListener('deviceorientation', (e) => {
        macaX = Math.max(-2.5, Math.min(2.5, e.gamma / 10));
      });

      // SKOK: Detekcija naglog pokreta telefona (Gore-Dole)
      window.addEventListener('devicemotion', (e) => {
        let acc = e.accelerationIncludingGravity;
        let sila = Math.sqrt(acc.x*acc.x + acc.y*acc.y + acc.z*acc.z);
        
        // Ako naglo trzneš telefon (sila > 18), maca skače
        if (sila > 18 && !skace) {
          pokreniSkok();
        }
      });

      // Rezervni skok na klik
      window.addEventListener('touchstart', pokreniSkok);
    </script>
  </body>
</html>
