<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moja AR Igra</title>
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
    <style>
        body { margin: 0; font-family: sans-serif; }
        model-viewer { width: 100vw; height: 100vh; background-color: #222; }
        .controls { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); }
        button { padding: 12px 24px; border-radius: 25px; border: none; background: #ff4757; color: white; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <model-viewer 
        src="Cat.glb" 
        ar 
        ar-modes="webxr scene-viewer quick-look" 
        camera-controls 
        auto-rotate 
        shadow-intensity="1">
        
        <div class="controls">
            <button slot="ar-button">🐾 POSTAVI MAČKU NA STO</button>
        </div>
        
    </model-viewer>

</body>
</html>
