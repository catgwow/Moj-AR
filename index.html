<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { overflow: hidden; background: transparent; }

      #ui-score {
        position: fixed;
        top: 18px;
        left: 50%;
        transform: translateX(-50%);
        color: #fff;
        font-size: 28px;
        font-weight: bold;
        font-family: 'Arial Rounded MT Bold', Arial, sans-serif;
        text-shadow: 0 2px 8px rgba(0,0,0,0.8);
        z-index: 1000;
        background: rgba(0, 0, 0, 0.5);
        padding: 8px 28px;
        border-radius: 40px;
        border: 2px solid rgba(255,255,255,0.2);
        pointer-events: none;
        white-space: nowrap;
      }

      #ui-hint {
        position: fixed;
        bottom: 28px;
        left: 50%;
        transform: translateX(-50%);
        color: rgba(255,255,255,0.9);
        font-size: 14px;
        font-family: Arial, sans-serif;
        background: rgba(0, 0, 0, 0.4);
        padding: 6px 18px;
        border-radius: 20px;
        pointer-events: none;
        z-index: 1000;
        white-space: nowrap;
      }

      #ui-combo {
        position: fixed;
        top: 80px;
        left: 50%;
        transform: translateX(-50%);
        color: #FFD700;
        font-size: 22px;
        font-weight: bold;
        font-family: Arial, sans-serif;
        text-shadow: 0 2px 6px rgba(0,0,0,0.9);
        z-index: 1000;
        pointer-events: none;
        opacity: 0;
        transition: opacity 0.3s;
      }
    </style>

    <script>
      // ── Globalne promenljive za mačku ──────────────────────
      let macaX    = 0;   // X pozicija (tilt levo/desno)
      let jumpY    = 0;   // Y pozicija (skok)
      let skace    = false;
      let bodovi   = 0;
      let combo    = 0;

      // ── Glavni A-Frame komponent ───────────────────────────
      AFRAME.registerComponent('igra', {

        init: function () {
          this.ribe  = [];
          this.maca  = null;
          this.uiScore = document.getElementById('ui-score');
          this.uiCombo = document.getElementById('ui-combo');

          // Spawn ribica s vremenskim razmakom
          for (let i = 0; i < 12; i++) {
            setTimeout(() => this.novaRiba(), i * 350);
          }
        },

        // ── Kreira novu ribicu ─────────────────────────────
        novaRiba: function () {
          const riba = document.createElement('a-entity');
          riba.setAttribute('gltf-model', 'Fish.glb');
          riba.setAttribute('scale', '0.003 0.003 0.003');

          // Nasumična startna pozicija iznad markera
          const startPos = this.randomStartPos();
          riba.object3D.position.set(startPos.x, startPos.y, startPos.z);

          // Brzina pada: 0.0006 – 0.0016 jedinica/ms  (pada 3–7 sekundi)
          riba._brzina  = 0.0006 + Math.random() * 0.001;
          riba._uhvacena = false;   // Flag da sprečimo dupli koliziju

          this.el.appendChild(riba);
          this.ribe.push(riba);
        },

        // ── Nasumična pozicija na vrhu ─────────────────────
        randomStartPos: function () {
          return {
            x: (Math.random() - 0.5) * 3.0,
            y: 4.0 + Math.random() * 2.5,   // 4 – 6.5 jedinica IZNAD stola
            z: (Math.random() - 0.5) * 3.0
          };
        },

        // ── Respawn ribice posle nestajanja ─────────────────
        respawnRiba: function (riba, delay) {
          riba._uhvacena = true;
          riba.object3D.visible = false;

          setTimeout(() => {
            const p = this.randomStartPos();
            riba.object3D.position.set(p.x, p.y, p.z);
            riba._uhvacena = false;
            riba.object3D.visible = true;
          }, delay);
        },

        // ── Prikaži combo tekst ──────────────────────────
        prikaziCombo: function (n) {
          if (n < 2) return;
          const el = this.uiCombo;
          el.textContent = n >= 5 ? `🔥 COMBO x${n}!` : `✨ Combo x${n}`;
          el.style.opacity = '1';
          clearTimeout(this._comboTimer);
          this._comboTimer = setTimeout(() => { el.style.opacity = '0'; }, 1200);
        },

        // ── Tick: fizika + kolizija (svaki frame) ───────────
        tick: function (time, delta) {

          // Ako marker nije vidljiv – pauziraj
          if (!this.el.object3D.visible) return;

          // Referencija na mačku
          if (!this.maca) {
            this.maca = this.el.querySelector('#maca');
            if (!this.maca) return;
          }

          // ① Primeni kretanje mačke (tilt + skok)
          this.maca.object3D.position.x = macaX;
          this.maca.object3D.position.y = jumpY;

          const macaPos = this.maca.object3D.position;
          const dt      = delta || 16; // ms po frejmu

          // ② Obradi svaku ribicu
          this.ribe.forEach(riba => {
            if (riba._uhvacena || !riba.object3D.visible) return;

            const pos = riba.object3D.position;

            // ──── Pad nadole ────────────────────────────────
            pos.y -= riba._brzina * dt;

            // ──── Lagana rotacija ribice ────────────────────
            riba.object3D.rotation.y += 0.025;

            // ──── Kolizija: MAČKA UHVATILA RIBICU ──────────
            const dx   = macaPos.x - pos.x;
            const dy   = macaPos.y - pos.y;
            const dz   = macaPos.z - pos.z;
            const dist = Math.sqrt(dx * dx + dy * dy + dz * dz);

            if (dist < 0.45) {
              bodovi++;
              combo++;
              this.uiScore.textContent = `🐟 ${bodovi}`;
              this.prikaziCombo(combo);
              // Kratka pauza pre respawna (mačka "pojela" ribu)
              this.respawnRiba(riba, 900 + Math.random() * 900);
              return; // preskoči ground check
            }

            // ──── Ribica UDARILA U STO (y ≤ 0) ─────────────
            if (pos.y <= 0) {
              combo = 0; // resetuj combo kad promašiš
              this.respawnRiba(riba, 200 + Math.random() * 600);
            }
          });
        }

      }); // kraj komponente
    </script>
  </head>

  <body>
    <div id="ui-score">🐟 0</div>
    <div id="ui-combo"></div>
    <div id="ui-hint">📱 Nagni za kretanje &nbsp;|&nbsp; Dodirni za skok</div>

    <a-scene
      embedded
      arjs="sourceType: webcam; debugUIEnabled: false;"
      vr-mode-ui="enabled: false"
      renderer="antialias: true; alpha: true">

      <!-- ─── Hiro marker + igra komponent ────────────────── -->
      <a-marker preset="hiro" igra>

        <!-- MAČKA – startuje na sredini stola -->
        <a-entity
          id="maca"
          gltf-model="Cat.glb"
          scale="1.3 1.3 1.3"
          position="0 0 0"
          rotation="0 180 0">
        </a-entity>

      </a-marker>

      <a-entity camera></a-entity>
    </a-scene>

    <script>
      // ── Tilt: mačka se kreće levo-desno ───────────────────
      window.addEventListener('deviceorientation', function (e) {
        const tilt = e.gamma || 0;
        // Ograniči na [-2.5, 2.5] u marker koordinatama
        macaX = Math.max(-2.5, Math.min(2.5, tilt / 11));
      });

      // ── Skok: parabolična animacija na dodir ──────────────
      window.addEventListener('touchstart', function () {
        if (skace) return;
        skace = true;

        const visina   = 0.85;   // max visina skoka (u jedinicama)
        const trajanje = 520;    // ms ukupno
        const pocetak  = performance.now();

        function animirajSkok(now) {
          const t = Math.min((now - pocetak) / trajanje, 1.0);
          // Sinusna parabola: 0 → max → 0
          jumpY = visina * Math.sin(Math.PI * t);
          if (t < 1.0) {
            requestAnimationFrame(animirajSkok);
          } else {
            jumpY  = 0;
            skace  = false;
          }
        }

        requestAnimationFrame(animirajSkok);
      });
    </script>
  </body>
</html>
