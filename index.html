<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  </head>
  <body style="margin: 0; overflow: hidden;">
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
      
      <a-marker preset="hiro">
        
        <a-entity 
          gltf-model="Cat.glb" 
          scale="0.5 0.5 0.5" 
          position="0 0 0" 
          rotation="0 180 0">
        </a-entity>

        <a-entity 
          gltf-model="Fish.glb" 
          scale="0.005 0.005 0.005" 
          position="-0.4 0.6 -1"
          animation="property: position; from: -0.4 0.6 -1; to: 0.4 -0.4 1; dur: 800; loop: true; easing: linear">
        </a-entity>

        <a-entity 
          gltf-model="Fish.glb" 
          scale="0.005 0.005 0.005" 
          position="0.4 0.3 -1.2"
          animation="property: position; from: 0.4 0.3 -1.2; to: -0.4 -0.4 1.2; dur: 900; delay: 150; loop: true; easing: linear">
        </a-entity>

      </a-marker>

      <a-entity camera></a-entity>
    </a-scene>
  </body>
</html>
