<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  </head>
  <body style="margin: 0; overflow: hidden;">
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
      
      <a-marker preset="hiro">
        
        <a-box position="0 0.5 0" material="color: red; opacity: 0.5;" scale="0.2 0.2 0.2"></a-box>

        <a-entity 
          gltf-model="Cat.glb" 
          scale="0.05 0.05 0.05" 
          position="0 0 0" 
          rotation="0 180 0">
        </a-entity>

        <a-entity 
          gltf-model="Fish.glb" 
          scale="0.01 0.01 0.01" 
          position="-0.5 0.5 -1.5"
          animation="property: position; from: -0.5 0.5 -1.5; to: 0.5 -0.5 1.5; dur: 500; loop: true; easing: linear">
        </a-entity>

        <a-entity 
          gltf-model="Fish.glb" 
          scale="0.01 0.01 0.01" 
          position="0.5 0.2 -1.5"
          animation="property: position; from: 0.5 0.2 -1.5; to: -0.5 -0.5 1.5; dur: 600; delay: 100; loop: true; easing: linear">
        </a-entity>

      </a-marker>

      <a-entity camera></a-entity>
    </a-scene>
  </body>
</html>
