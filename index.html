<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <script>
      AFRAME.registerComponent('vertikalna-kisa', {
        init: function () {
          this.maca = document.querySelector('#maca');
          this.scena = document.querySelector('a-marker');
          
          // Stvaramo 50 ribica za gustu kišu
          for (let i = 0; i < 50; i++) {
            this.stvoriRibu();
          }
        },

        stvoriRibu: function () {
          let riba = document.createElement('a-entity');
          riba.setAttribute('gltf-model', 'Fish.glb');
          riba.setAttribute('scale', '0.003 0.003 0.003');
          riba.setAttribute('class', 'riba');
          
          // Postavljanje: X je nasumično lijevo-desno
          // Y počinje visoko (6), Z je fiksno na 2 (blizu telefona/tebe)
          let x = (Math.random() - 0.5) * 5;
          let y_start = 6 + Math.random() * 4;
          let z = 2; // Ovo osigurava da padaju ispred markera, kod tebe
          
          riba.setAttribute('position', {x: x, y: y_start, z: z});
          
          // ANIMACIJA: Strogo vertikalni pad (X i Z se ne mijenjaju)
          let brzina = 1000 + Math.random() * 1500;
          riba.setAttribute('animation', `
            property: position; 
            to: ${x} -3 ${z}; 
            dur: ${brzina}; 
            easing: linear; 
            loop: true
          `);
          
          this.scena.appendChild(riba);
        },

        tick: function () {
          let ribe = document.querySelectorAll('.riba');
          let macaPos = new THREE.Vector3();
          this.maca.object3D.getWorldPosition(macaPos);

          ribe.forEach((riba) => {
            if (!riba.object3D) return;
            let ribaPos = new THREE.Vector3();
            riba.object3D.getWorldPosition(ribaPos);
            
            // 1. SUDAR S MACOM
            let dist = macaPos.distanceTo(ribaPos);
            if (dist < 0.6 && riba.getAttribute('visible') !== false) {
              riba.setAttribute('visible', 'false');
              setTimeout(() => { this.resetRiba(riba); }, 1000);
            }

            // 2. NESTAJANJE NA STOLU (Y = -3)
            if (ribaPos.y <= -2.9) {
               riba.setAttribute('visible', 'false');
               setTimeout(() => { this.resetRiba(riba); }, 100);
            }
          });
        },

        resetRiba: function(riba) {
          let x = (Math.random() - 0.5) * 5;
          let y_start = 6;
          let z = 2;
          riba.setAttribute('position', {x: x, y: y_start, z: z});
          riba.setAttribute('visible', 'true');
        }
      });
    </script>
  </head>
  <body style="margin: 0; overflow: hidden;">
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" vertikalna-kisa>
      
      <a-marker preset="hiro">
        
        <a-entity id="maca-container">
          <a-entity 
            id="maca"
            gltf-model="Cat.glb" 
            scale="1.4 1.4 1.4" 
            position="0 -3 2" 
            rotation="0 180 0"
            animation__skok="property: position; from: 0 -3 2; to: 0 -1 2; dur: 300; dir: alternate; loop: 1; startEvents: skoci">
          </a-entity>
        </a-entity>

      </a-marker>

      <a-entity camera></a-entity>
    </a-scene>

    <script>
      // Skok na dodir ekrana
      window.addEventListener('touchstart', () => {
        document.querySelector('#maca').emit('skoci');
      });

      // UPRAVLJANJE: Maca prati nagib telefona (Levo-Desno)
      window.addEventListener('deviceorientation', function(event) {
        let maca = document.querySelector('#maca');
        if(maca) {
          let nagib = event.gamma; // Nagib levo-desno
          // Pomera macu po X osi (stolu) do 3 metra levo ili desno
          let moveX = Math.max(Math.min(nagib / 6, 3), -3); 
          maca.object3D.position.x = moveX;
        }
      });
    </script>
  </body>
</html>
