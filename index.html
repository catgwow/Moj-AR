<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  </head>
  <body style="margin: 0; overflow: hidden;">
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
      
      <a-marker preset="hiro">
        
        <a-entity 
          id="maca"
          gltf-model="Cat.glb" 
          scale="1.2 1.2 1.2" 
          position="0 -2 1.5" 
          rotation="0 180 0"
          animation="property: position; to: 0 -0.5 1.5; dur: 400; dir: alternate; loop: 1; startEvents: click">
        </a-entity>

        <a-entity gltf-model="Fish.glb" scale="0.005 0.005 0.005" position="-1 4 -2"
          animation="property: position; to: 1 -2 2; dur: 2000; loop: true; easing: linear">
        </a-entity>

        <a-entity gltf-model="Fish.glb" scale="0.005 0.005 0.005" position="1 4 -1"
          animation="property: position; to: -1 -2 1; dur: 2500; loop: true; easing: linear">
        </a-entity>

        <a-entity gltf-model="Fish.glb" scale="0.005 0.005 0.005" position="0 5 0"
          animation="property: position; to: 0 -2 0; dur: 1800; loop: true; easing: linear">
        </a-entity>

        <a-entity gltf-model="Fish.glb" scale="0.005 0.005 0.005" position="-0.5 3 1"
          animation="property: position; to: 0.5 -2 -1; dur: 2200; loop: true; easing: linear">
        </a-entity>

      </a-marker>

      <a-entity camera></a-entity>
    </a-scene>
  </body>
</html>
