<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>AR Igra - Mačka</title>
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
    <style>
        body { margin: 0; background-color: #000; }
        model-viewer { width: 100vw; height: 100vh; }
        .ar-button {
            position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
            padding: 15px 35px; background: #00ff00; border: none; border-radius: 50px;
            font-weight: bold; font-size: 18px; color: black; z-index: 1000;
        }
    </style>
</head>
<body>

    <model-viewer 
        id="macka-model"
        src="Cat.glb" 
        ar 
        ar-modes="webxr scene-viewer quick-look" 
        camera-controls 
        shadow-intensity="1" 
        autoplay
        ar-placement="floor"
        interaction-prompt="auto">
        
        <button slot="ar-button" class="ar-button">
            START AR IGRICA
        </button>

    </model-viewer>

    <script>
        const modelViewer = document.querySelector("#macka-model");

        // Forsiranje animacije za Android i iPhone pretraživače
        modelViewer.addEventListener("load", () => {
            const availableAnimations = modelViewer.getAvailableAnimations();
            if (availableAnimations.length > 0) {
                // Postavlja prvu dostupnu animaciju (rep, glava, hod)
                modelViewer.animationName = availableAnimations[0];
                modelViewer.play();
            }
        });
    </script>

</body>
</html>
