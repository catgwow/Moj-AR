<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  </head>
  <body style="margin: 0; overflow: hidden;">
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
      
      <a-marker preset="hiro">
        
        <a-entity 
          gltf-model="Cat.glb" 
          scale="0.008 0.008 0.008" 
          position="0 0 1.2" 
          rotation="0 180 0">
        </a-entity>

        <a-entity 
          gltf-model="Fish.glb" 
          scale="0.0005 0.0005 0.0005" 
          position="-0.3 0.5 -2.5"
          animation="property: position; from: -0.3 0.5 -2.5; to: -0.1 -1.5 2.5; dur: 80; loop: true; easing: linear">
        </a-entity>

        <a-entity 
          gltf-model="Fish.glb" 
          scale="0.0005 0.0005 0.0005" 
          position="0.3 0.2 -2.5"
          animation="property: position; from: 0.3 0.2 -2.5; to: 0.1 -1.5 2.5; dur: 70; delay: 20; loop: true; easing: linear">
        </a-entity>

        <a-entity 
          gltf-model="Fish.glb" 
          scale="0.0005 0.0005 0.0005" 
          position="0 0.8 -2.5"
          animation="property: position; from: 0 0.8 -2.5; to: 0 -2 2.5; dur: 60; loop: true; easing: linear">
        </a-entity>

      </a-marker>

      <a-entity camera></a-entity>
    </a-scene>
  </body>
</html>
