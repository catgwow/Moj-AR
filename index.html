<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Ribe padaju na macu - AR</title>

  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

  <script>
    AFRAME.registerComponent('lovac-sistem', {
      init: function () {
        this.maca = document.querySelector('#maca');
        this.marker = document.querySelector('a-marker');

        // Stvaramo 30 ribica
        for (let i = 0; i < 30; i++) {
          this.stvoriRibu();
        }
      },

      stvoriRibu: function () {
        const riba = document.createElement('a-entity');
        riba.setAttribute('gltf-model', 'Fish.glb');
        riba.setAttribute('scale', '0.003 0.003 0.003');
        riba.setAttribute('class', 'riba');

        const x = (Math.random() - 0.5) * 5;
        const z = (Math.random() - 0.5) * 5;
        const y = 3 + Math.random() * 4; // 3–7m iznad markera

        riba.setAttribute('position', `${x} ${y} ${z}`);

        const trajanje = 1800 + Math.random() * 2200; // 1.8–4 sekunde

        riba.setAttribute('animation', {
          property: 'position',
          to: `${x} -0.5 ${z}`,
          dur: trajanje,
          easing: 'linear',
          loop: true
        });

        this.marker.appendChild(riba);
      },

      tick: function () {
        const macaPos = new THREE.Vector3();
        this.maca.object3D.getWorldPosition(macaPos);

        document.querySelectorAll('.riba').forEach(riba => {
          if (riba.getAttribute('visible') === 'false') return;

          const ribaPos = new THREE.Vector3();
          riba.object3D.getWorldPosition(ribaPos);

          // Sudar s mačkom
          const dist = macaPos.distanceTo(ribaPos);
          if (dist < 0.55) {
            riba.setAttribute('visible', 'false');
            setTimeout(() => this.resetRiba(riba), 900);
            return;
          }

          // Pala na pod/sto
          if (ribaPos.y < 0.1) {
            riba.setAttribute('visible', 'false');
            setTimeout(() => this.resetRiba(riba), 100);
          }
        });
      },

      resetRiba: function (riba) {
        const x = (Math.random() - 0.5) * 5;
        const z = (Math.random() - 0.5) * 5;
        const y = 3 + Math.random() * 4;

        riba.setAttribute('position', `${x} ${y} ${z}`);
        riba.setAttribute('visible', 'true');
      }
    });
  </script>
</head>

<body style="margin:0; overflow:hidden; background:#000;">

  <a-scene
    embedded
    arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 3x3;"
    lovac-sistem
  >
    <a-marker preset="hiro">

      <!-- Mačka -->
      <a-entity id="maca-wrapper">
        <a-entity
          id="maca"
          gltf-model="Cat.glb"
          scale="1.3 1.3 1.3"
          position="0 0 2.5"
          rotation="0 180 0"
          animation__skok="
            property: position;
            from: 0 0 2.5;
            to: 0 1.2 2.5;
            dur: 300;
            dir: alternate;
            loop: 1;
            startEvents: skoci"
        ></a-entity>
      </a-entity>

      <!-- Ribe će biti dinamički dodane ovdje -->

    </a-marker>

    <a-entity camera></a-entity>
  </a-scene>

  <script>
    // Skok mačke na dodir
    window.addEventListener('touchstart', () => {
      document.querySelector('#maca')?.emit('skoci');
    });

    // Pomicanje lijevo-desno prema nagibu telefona
    window.addEventListener('deviceorientation', e => {
      const maca = document.querySelector('#maca');
      if (!maca) return;

      let tilt = e.gamma || 0;
      tilt = Math.max(Math.min(tilt / 10, 3), -3);
      maca.object3D.position.x = tilt;
    });
  </script>

</body>
</html>
