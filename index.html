<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; }
        #ui {
            position: absolute; top: 20px; width: 100%; text-align: center;
            color: #22ff22; font-family: Arial; font-weight: bold; z-index: 100;
        }
        .ar-button {
            position: fixed;
            bottom: 40px; /* Ovo spušta dugme na dno za iPhone */
            left: 50%;
            transform: translateX(-50%);
            padding: 15px 35px;
            background: #22ff22;
            color: #000;
            border: none;
            border-radius: 50px;
            font-weight: bold;
            font-size: 18px;
            z-index: 1000;
        }
    </style>
</head>
<body>
    <div id="ui">POENI: 0<br>Pomeraj telefon da nađeš pod!</div>

    <model-viewer 
        src="Cat.glb" 
        ar 
        ar-modes="webxr scene-viewer quick-look" 
        camera-controls 
        autoplay 
        animation-name="walk"
        scale="0.02 0.02 0.02" 
        ar-placement="floor"
        shadow-intensity="1">
        
        <button slot="ar-button" class="ar-button">START IGRICA</button>
    </model-viewer>

    <script>
        // Logika za 'kišu' ribica (pojavljivanje Fish.glb modela)
        // će biti dodata čim potvrdiš da mačka konačno hoda
    </script>
</body>
</html>
