<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
    <style>
        body { margin: 0; background: #000; }
        model-viewer { width: 100vw; height: 100vh; }
        .ar-button {
            position: absolute; bottom: 15%; left: 50%; transform: translateX(-50%);
            padding: 16px 30px; background: #22ff22; color: #000; border: none;
            border-radius: 50px; font-weight: bold; z-index: 999;
        }
    </style>
</head>
<body>

    <model-viewer 
        id="macka"
        src="Cat.glb" 
        ar 
        ar-modes="scene-viewer webxr quick-look" 
        ar-scale="auto"
        camera-controls 
        autoplay
        shadow-intensity="1" 
        ar-placement="floor"
        scale="0.2 0.2 0.2">
        
        <button slot="ar-button" class="ar-button">START AR IGRICA</button>
        
    </model-viewer>

    <script>
        const modelViewer = document.querySelector("#macka");
        modelViewer.addEventListener("load", () => {
            // Usporavamo animaciju na pola brzine (0.5) da ne bi pobegla
            modelViewer.timeScale = 0.5;
        });
    </script>

</body>
</html>
