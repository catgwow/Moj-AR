<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://aframe.io/releases/1.4.1/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v6.1.1/dist/aframe-extras.min.js"></script>
    <style>
        #ui { position: fixed; top: 10px; width: 100%; text-align: center; color: #22ff22; font-family: sans-serif; z-index: 1000; font-weight: bold; font-size: 20px; }
    </style>
</head>
<body style="margin: 0; overflow: hidden;">
    <div id="ui">POENI: <span id="score">0</span><br>Usmeri kameru u HIRO marker!</div>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
        
        <a-marker preset="hiro">
            
            <a-entity 
                id="macka" 
                gltf-model="url(Cat.glb)" 
                position="0 0 0" 
                scale="0.05 0.05 0.05" 
                animation-mixer="clip: walk">
            </a-entity>

            <a-entity id="fish-container"></a-entity>

        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>

    <script>
        const container = document.querySelector('#fish-container');
        let score = 0;

        function spawnFish() {
            const fish = document.createElement('a-entity');
            fish.setAttribute('gltf-model', 'url(Fish.glb)');
            
            // Ribica se stvara 2 metra iznad markera (solje)
            fish.setAttribute('position', '0 2 0'); 
            fish.setAttribute('scale', '0.03 0.03 0.03');
            
            // Animacija: Ribica pada sa visine na marker
            fish.setAttribute('animation', 'property: position; to: 0 0 0; dur: 3000; easing: linear');
            
            container.appendChild(fish);

            // Automatsko skupljanje poena kad riba "padne" do macke
            setTimeout(() => {
                score++;
                document.querySelector('#score').innerText = score;
                if(fish.parentNode) container.removeChild(fish);
            }, 3000);
        }

        // Svake 3 sekunde ispada po jedna ribica
        setInterval(spawnFish, 3000);
    </script>
</body>
</html>
