<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AR Igra</title>
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
    <style>
        body { margin: 0; background-color: #000; }
        model-viewer { 
            width: 100vw; 
            height: 100vh; 
            --poster-color: transparent;
        }
        /* Popravljeno dugme da se uvek vidi na sredini iznad donje trake */
        .ar-button {
            position: absolute;
            bottom: 20%; 
            left: 50%;
            transform: translateX(-50%);
            padding: 18px 30px;
            background-color: #22ff22;
            color: #000;
            border: none;
            border-radius: 50px;
            font-weight: bold;
            font-size: 18px;
            z-index: 9999;
            display: block !important;
        }
    </style>
</head>
<body>

    <model-viewer 
        id="macka"
        src="Cat.glb" 
        ar 
        ar-modes="scene-viewer webxr quick-look" 
        camera-controls 
        shadow-intensity="1" 
        autoplay
        ar-placement="floor">
        
        <button slot="ar-button" class="ar-button">
            START AR IGRICA
        </button>

    </model-viewer>

    <script>
        const modelViewer = document.querySelector("#macka");
        modelViewer.addEventListener("load", () => {
            const animations = modelViewer.getAvailableAnimations();
            if (animations.length > 0) {
                modelViewer.animationName = animations[0];
                modelViewer.play();
            }
        });
    </script>

</body>
</html>
