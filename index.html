<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  </head>
  <body style="margin: 0; overflow: hidden;">
    <a-scene 
      embedded 
      arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 3x3; patternRatio: 0.5;">
      
      <a-marker type="pattern" url="Marker.patt">
        
        <a-entity 
          gltf-model="Cat.glb" 
          scale="0.5 0.5 0.5" 
          position="0 0 0" 
          rotation="0 180 0">
        </a-entity>

        <a-entity 
          gltf-model="Fish.glb" 
          position="-0.6 1 -0.5" 
          scale="0.15 0.15 0.15" 
          animation="property: position; to: -0.6 1.3 -0.5; dur: 1200; dir: alternate; loop: true">
        </a-entity>

        <a-entity 
          gltf-model="Fish.glb" 
          position="0.7 0.7 0.4" 
          scale="0.15 0.15 0.15" 
          rotation="0 45 0" 
          animation="property: position; to: 0.7 1.0 0.4; dur: 1500; dir: alternate; loop: true">
        </a-entity>

        <a-entity 
          gltf-model="Fish.glb" 
          position="0 1.5 -0.8" 
          scale="0.2 0.2 0.2" 
          rotation="0 180 0" 
          animation="property: position; to: 0 1.8 -0.8; dur: 1000; dir: alternate; loop: true">
        </a-entity>

      </a-marker>

      <a-entity camera></a-entity>
    </a-scene>
  </body>
</html>
